<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:">
  <title>Guru — Ancient OCR Master</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/components.css">
</head>
<body>
  <div id="app">
    <!-- Top bar -->
    <header id="top-bar">
      <span id="app-title">Guru</span>
      <div id="top-bar-right">
        <button id="btn-lang-toggle" class="btn btn-icon" data-i18n="lang-toggle">EN</button>
      </div>
    </header>

    <!-- System status banner -->
    <div id="status-banner" class="hidden"></div>

    <!-- Update banner -->
    <div id="update-banner" class="hidden">
      <span id="update-message"></span>
      <button id="btn-update-restart" class="btn btn-primary hidden" data-i18n="update-btn-restart"></button>
      <button id="btn-update-later" class="btn btn-secondary hidden" data-i18n="update-btn-later"></button>
    </div>

    <div id="main-layout">
      <!-- Left panel -->
      <aside id="left-panel">

        <!-- File section: full-window drag target -->
        <section id="file-section">
          <div id="drop-zone" class="drop-zone">
            <div class="drop-icon">📄</div>
            <p class="drop-hint" data-i18n="drop-hint">PDF 또는 이미지를 여기에 드래그하세요</p>
            <p class="drop-hint-sub" data-i18n="drop-hint-sub">또는</p>
            <button id="btn-open-file" class="btn btn-primary" data-i18n="open-file">파일 열기…</button>
          </div>
          <div id="file-info" class="hidden">
            <div class="file-name" id="file-name-display"></div>
            <div class="file-meta" id="file-meta-display"></div>
            <button id="btn-change-file" class="btn btn-secondary btn-sm">↩</button>
          </div>
        </section>

        <!-- Options section -->
        <section id="options-section">
          <!-- Languages -->
          <h3 data-i18n="sec-languages">인식 언어</h3>
          <div class="checkbox-group">
            <label><input type="checkbox" id="lang-grc" value="grc" checked> <span data-i18n="lang-grc">고대 그리스어</span></label>
            <label><input type="checkbox" id="lang-lat" value="lat" checked> <span data-i18n="lang-lat">라틴어</span></label>
            <label><input type="checkbox" id="lang-eng" value="eng" checked> <span data-i18n="lang-eng">영어</span></label>
          </div>

          <!-- Image Enhancement -->
          <h3 data-i18n="sec-enhancement">이미지 전처리</h3>
          <div class="checkbox-group">

            <div class="opt-item">
              <label><input type="checkbox" id="opt-deskew" checked> <span data-i18n="opt-deskew">기울기 보정 (2단계)</span></label>
              <div class="opt-sub hidden" id="sub-deskew">
                <span data-i18n="opt-deskew-sub">최대 각도 (°)</span>
                <input type="number" id="opt-deskew-angle" min="1" max="45" value="10" step="1">
              </div>
            </div>

            <label><input type="checkbox" id="opt-grayscale" checked> <span data-i18n="opt-grayscale">그레이스케일 변환</span></label>
            <label><input type="checkbox" id="opt-bw"> <span data-i18n="opt-bw">흑백 변환 (B&amp;W)</span></label>

            <div class="opt-item">
              <label><input type="checkbox" id="opt-denoise" checked> <span data-i18n="opt-denoise">노이즈 제거</span></label>
              <div class="opt-sub hidden" id="sub-denoise">
                <span data-i18n="opt-denoise-sub">강도</span>
                <select id="opt-denoise-strength">
                  <option value="5">약</option>
                  <option value="10" selected>중</option>
                  <option value="20">강</option>
                </select>
              </div>
            </div>

            <label><input type="checkbox" id="opt-autocontrast" checked> <span data-i18n="opt-autocontrast">자동 대비</span></label>

            <div class="opt-item">
              <label><input type="checkbox" id="opt-upscale-on"> <span data-i18n="opt-upscale">이미지 업스케일</span></label>
              <div class="opt-sub hidden" id="sub-upscale">
                <span data-i18n="opt-upscale-sub">배율</span>
                <select id="opt-upscale">
                  <option value="2">2×</option>
                  <option value="3">3×</option>
                  <option value="4">4× (Lanczos)</option>
                </select>
              </div>
            </div>

          </div>

          <!-- Zone / Layout -->
          <h3 data-i18n="sec-zones">레이아웃 존</h3>
          <div class="checkbox-group">
            <div class="option-row">
              <label data-i18n="opt-zone-preset">존 프리셋</label>
              <select id="opt-zone-preset">
                <option value="" data-i18n="zone-auto">자동</option>
                <option value="full_page" data-i18n="zone-full">전체 페이지</option>
                <option value="body_only" data-i18n="zone-body">본문만</option>
                <option value="left_margin" data-i18n="zone-left-margin">왼쪽 여백</option>
                <option value="right_margin" data-i18n="zone-right-margin">오른쪽 여백</option>
                <option value="both_margins" data-i18n="zone-both-margins">양쪽 여백</option>
                <option value="auto_detect" data-i18n="zone-auto-detect">블록 자동 감지</option>
              </select>
            </div>
            <div class="opt-item">
              <label><input type="checkbox" id="opt-custom-margins"> <span data-i18n="opt-custom-margins">여백 설정</span></label>
              <div class="opt-sub hidden" id="sub-margins">
                <span data-i18n="margin-top">위 %</span>
                <input type="number" id="margin-top" min="0" max="30" value="5" style="width:36px">
                <span data-i18n="margin-bottom">아래</span>
                <input type="number" id="margin-bottom" min="0" max="30" value="5" style="width:36px">
                <span data-i18n="margin-left">왼쪽</span>
                <input type="number" id="margin-left" min="0" max="30" value="7" style="width:36px">
                <span data-i18n="margin-right">오른쪽</span>
                <input type="number" id="margin-right" min="0" max="30" value="7" style="width:36px">
              </div>
            </div>
            <div class="option-row">
              <label><input type="checkbox" id="opt-custom-zones"> <span data-i18n="opt-custom-zones">커스텀 존 편집</span></label>
              <button id="btn-clear-zones" class="btn btn-icon btn-sm" data-i18n="btn-clear-zones">초기화</button>
            </div>
          </div>

          <!-- OCR Options -->
          <h3 data-i18n="sec-ocr">OCR 옵션</h3>
          <div class="checkbox-group">

            <label><input type="checkbox" id="opt-layout" checked> <span data-i18n="opt-layout">레이아웃 감지 (단/복칸)</span></label>

            <div class="opt-item">
              <label><input type="checkbox" id="opt-confidence-retry" checked> <span data-i18n="opt-confidence-retry">스마트 재시도</span></label>
              <div class="opt-sub hidden" id="sub-confidence">
                <span data-i18n="opt-confidence-sub">신뢰도 임계값 (%)</span>
                <input type="number" id="opt-confidence-threshold" min="0" max="100" value="60" step="5">
              </div>
            </div>

            <label><input type="checkbox" id="opt-toc" checked> <span data-i18n="opt-toc">목차 자동 감지</span></label>
            <label><input type="checkbox" id="opt-page-numbers" checked> <span data-i18n="opt-page-numbers">페이지 번호 추출</span></label>

            <div class="opt-item">
              <label><input type="checkbox" id="opt-split-bilingual"> <span data-i18n="opt-split-bilingual">이중 언어 PDF 분리</span></label>
              <div class="opt-sub hidden" id="sub-split">
                <span data-i18n="opt-split-lang-a">언어 A</span>
                <input type="text" id="opt-split-lang-a" value="greek">
                <span data-i18n="opt-split-lang-b">언어 B</span>
                <input type="text" id="opt-split-lang-b" value="latin">
                <span data-i18n="opt-split-shared">공유 범위</span>
                <input type="number" id="opt-split-shared-start" min="1" placeholder="1" style="width:46px">
                <span>–</span>
                <input type="number" id="opt-split-shared-end" min="1" placeholder="끝" style="width:46px">
              </div>
            </div>

            <div class="opt-item">
              <label><input type="checkbox" id="opt-page-range"> <span data-i18n="opt-page-range">처리 페이지 범위</span></label>
              <div class="opt-sub hidden" id="sub-page-range">
                <span data-i18n="opt-page-range-from">시작</span>
                <input type="number" id="opt-page-range-start" min="1" value="1" style="width:50px">
                <span>–</span>
                <input type="number" id="opt-page-range-end" min="1" placeholder="끝" style="width:50px">
              </div>
            </div>

            <div class="opt-item">
              <label><span data-i18n="opt-threads">처리 스레드 수</span></label>
              <div class="opt-sub-inline">
                <select id="opt-threads">
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="4" selected>4</option>
                </select>
              </div>
            </div>

          </div>
        </section>

        <div id="action-buttons">
          <button id="btn-process" class="btn btn-success" disabled data-i18n="btn-process">파일 처리</button>
          <button id="btn-cancel" class="btn btn-danger hidden" data-i18n="btn-cancel">취소</button>
          <button id="btn-download-data" class="btn btn-secondary" data-i18n="btn-download-data">데이터 다운로드…</button>
        </div>
      </aside>

      <!-- Center panel -->
      <main id="center-panel">
        <div id="preview-container">
          <div id="page-nav" class="hidden">
            <button id="btn-prev-page" class="btn btn-icon">◀</button>
            <span id="page-indicator"></span>
            <button id="btn-next-page" class="btn btn-icon">▶</button>
          </div>
          <div id="preview-canvas-wrap">
            <canvas id="preview-canvas" class="hidden"></canvas>
            <div id="zone-overlay"></div>
          </div>
          <div id="preview-placeholder">
            <div class="placeholder-icon">Γ</div>
            <p data-i18n="preview-placeholder">PDF를 열면 미리보기가 표시됩니다</p>
          </div>
        </div>

        <div id="progress-container" class="hidden">
          <div id="progress-bar-wrap">
            <div id="progress-bar"></div>
          </div>
          <div id="progress-text"></div>
          <div id="progress-confidence"></div>
        </div>
      </main>

      <!-- Right panel -->
      <aside id="right-panel">
        <div id="result-section" class="hidden">
          <h3 data-i18n="result-title">처리 결과</h3>
          <div class="result-stat">
            <span class="stat-label" data-i18n="stat-pages">처리된 페이지</span>
            <span id="stat-pages" class="stat-value">—</span>
          </div>
          <div class="result-stat">
            <span class="stat-label" data-i18n="stat-confidence">평균 신뢰도</span>
            <span id="stat-confidence" class="stat-value">—</span>
          </div>
          <div class="result-stat">
            <span class="stat-label" data-i18n="stat-output">저장 경로</span>
            <span id="stat-output" class="stat-value stat-path">—</span>
          </div>
          <button id="btn-open-output" class="btn btn-primary hidden" data-i18n="btn-open-output">출력 PDF 열기</button>
        </div>

        <div id="toc-section" class="hidden">
          <h3 data-i18n="toc-title">목차</h3>
          <ul id="toc-list" class="toc-list"></ul>
        </div>

        <div id="manual-toc-section">
          <h3 data-i18n="manual-toc-title">수동 목차 항목</h3>
          <div id="manual-toc-list"></div>
          <div class="manual-toc-add">
            <input type="text" id="toc-add-title" placeholder="제목" style="width:100%;margin-bottom:4px">
            <div style="display:flex;gap:4px">
              <input type="number" id="toc-add-page" min="1" placeholder="페이지" style="width:55px">
              <select id="toc-add-level" style="flex:1">
                <option value="1" data-i18n="toc-level-chapter">챕터</option>
                <option value="2" data-i18n="toc-level-section">섹션</option>
                <option value="3" data-i18n="toc-level-subsection">소섹션</option>
              </select>
              <button id="btn-toc-add" class="btn btn-primary btn-sm" data-i18n="toc-add-btn">+</button>
            </div>
          </div>
        </div>

        <div id="log-section">
          <h3 data-i18n="log-title">로그</h3>
          <div id="log-output"></div>
        </div>
      </aside>
    </div>
  </div>

  <!-- Data Download dialog -->
  <div id="data-dialog" class="dialog-overlay hidden">
    <div class="dialog">
      <h2 data-i18n="data-dialog-title">OCR 데이터 다운로드</h2>
      <p class="form-group" style="font-size:11px;color:var(--text-muted)" data-i18n="data-dialog-desc">
        tessdata_best 및 검증된 그리스어/라틴어 코퍼스를 다운로드합니다.
      </p>
      <div class="form-group">
        <label data-i18n="data-tessdata-label">Tesseract 언어 데이터</label>
        <div class="checkbox-group">
          <label><input type="checkbox" id="dl-grc" checked> Ancient Greek (grc)</label>
          <label><input type="checkbox" id="dl-lat" checked> Latin (lat)</label>
          <label><input type="checkbox" id="dl-eng"> English (eng)</label>
        </div>
      </div>
      <div class="form-group">
        <label data-i18n="data-corpus-label">코퍼스 (참고용)</label>
        <div class="checkbox-group">
          <label><input type="checkbox" id="dl-lace"> LACE Greek OCR Corrections</label>
          <label><input type="checkbox" id="dl-ogl"> OpenGreekAndLatin TEI corpus</label>
        </div>
      </div>
      <div id="data-progress-wrap" class="hidden">
        <div id="data-progress-bar-wrap" style="height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-bottom:6px">
          <div id="data-progress-bar" style="height:100%;background:var(--accent);width:0%;transition:width 0.3s ease"></div>
        </div>
        <div id="data-progress-text" style="font-size:11px;color:var(--text-muted)"></div>
      </div>
      <div class="dialog-actions">
        <button id="btn-data-start" class="btn btn-success" data-i18n="data-start-btn">다운로드 시작</button>
        <button id="btn-data-close" class="btn btn-secondary" data-i18n="data-close-btn">닫기</button>
      </div>
    </div>
  </div>

  <script type="module" src="renderer.js"></script>
</body>
</html>
